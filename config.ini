# Central configuration for the depot RL agent.
# Edit values here instead of in the Python files. Any key you omit falls back to
# the dataclass default. Override any value on the CLI, e.g.:
#     python train.py full --n_blocks 5 --w_reshuffle 4
# Named experiments (train.py EXPERIMENTS) apply their deltas on top of this base;
# the "full" experiment uses this base as-is.

[depot]
n_blocks = 6
n_bays   = 4
n_rows   = 4
n_tiers  = 6
n_ticks  = 30
max_in   = 5
max_out  = 5

[reward]
w_action_bonus      = 0.1
w_burial            = 0.5
w_height            = 0.2
w_dwell             = 1.0
w_travel            = 0.3
w_travel_compensate = 0.1
threshold_divisor   = 2
w_reshuffle         = 3.0
reshuffle_mult_same     = 1.0
reshuffle_mult_adjacent = 2.0
reshuffle_mult_far      = 4.0
w_mean_idle         = 0.1
w_max_idle          = 0.2
w_episode_bonus     = 10.0
w_full_drop         = 50.0

[train]
total_timesteps = 2000000
n_envs          = 8
device          = cpu
learning_rate   = 3e-4
n_steps         = 2048
batch_size      = 256
n_epochs        = 10
gamma           = 0.99
gae_lambda      = 0.95
clip_range      = 0.2


; w_dwell             = 1.0
; w_reshuffle         = 1.0
; w_burial            = 0.5